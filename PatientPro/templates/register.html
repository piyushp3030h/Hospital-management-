{% extends 'user_base.html' %}

{% block css %}
<style>
    body {
        background: linear-gradient(135deg, #f0f4f8, #d9e2ec);
    }

    .register-container {
        max-width: 500px;
        margin: 60px auto;
        background: #ffffff;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        border-radius: 20px;
        padding: 40px;
    }

    .form-floating label {
        font-weight: 500;
    }

    .form-control, .form-select {
        border-radius: 12px;
    }

    .form-control:focus, .form-select:focus {
        border-color: #4a90e2;
        box-shadow: 0 0 0 0.2rem rgba(74, 144, 226, 0.25);
    }

    .btn-primary {
        background-color: #4a90e2;
        border: none;
        border-radius: 12px;
        transition: background-color 0.3s ease;
    }

    .btn-primary:hover {
        background-color: #3a78c2;
    }

    .form-note {
        text-align: center;
        margin-top: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #333;
    }
</style>
{% endblock %}

{% block content %}

<div class="register-container">
    <h1 class="display-6 fw-bold">Create Your Account</h1>
    <form method="POST">
        {% csrf_token %}

        <div class="form-floating mb-3">
            <input type="text" name="username" class="form-control" id="id_username" placeholder="Username" required />
            <label for="id_username">Username</label>
        </div>

        <div class="form-floating mb-3">
            <input type="text" name="full_name" class="form-control" id="id_full_name" placeholder="Full Name" required />
            <label for="id_full_name">Full Name</label>
        </div>

        <div class="form-floating mb-3">
            <input type="email" name="email" class="form-control" id="id_email" placeholder="name@example.com" required />
            <label for="id_email">Email address</label>
        </div>

        <div class="form-floating mb-3">
            <input type="password" name="password1" class="form-control" id="id_password1" placeholder="Password" required />
            <label for="id_password1">Enter Password</label>
        </div>

        <div class="form-floating mb-3">
            <input type="password" name="password2" class="form-control" id="id_password2" placeholder="Confirm Password" required />
            <label for="id_password2">Confirm Password</label>
        </div>

        <div class="form-floating mb-4">
            <select name="user_type" class="form-select" id="id_user_type" required>
                <option value="" disabled selected>Select your role</option>
                <option value="patient">Patient</option>
                <option value="doctor">Doctor</option>
            </select>
            <label for="id_user_type">User Type</label>
        </div>

        <div class="form-floating mb-4" id="license_field" style="display: none;">
            <input type="Number" name="professional_license_number" class="form-control" id="id_professional_license_number" placeholder="Medical License Number" />
            <label for="id_professional_license_number">License Number</label>
        </div>

        <button class="w-100 btn btn-lg btn-primary" type="submit">Register</button>

        <div class="form-note">
            <hr class="my-4">
            <small class="text-muted">Already have an account? <a href="{% url 'login' %}">Sign In</a></small>
        </div>
    </form>
</div>

<script>
    function toggleLicenseField() {
        const userType = document.getElementById("id_user_type").value;
        const licenseField = document.getElementById("license_field");

        if (userType === "doctor") {
            licenseField.style.display = "block";
        } else {
            licenseField.style.display = "none";
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        toggleLicenseField();  // in case form was reloaded with doctor already selected
        document.getElementById("id_user_type").addEventListener("change", toggleLicenseField);
    });
</script>


{% endblock content %}
